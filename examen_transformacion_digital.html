<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> index.html
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);height:100vh;color:#e0e0e0;overflow:hidden}
.container{max-width:800px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:12px 16px}
#start-screen{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px}
#start-screen h2{font-size:1.6rem;color:#fff}
#start-screen p{color:#aaa;font-size:0.9rem}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:12px 36px;font-size:1rem;border-radius:12px;cursor:pointer;transition:all 0.3s;font-weight:600;letter-spacing:0.5px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}
.btn:active{transform:translateY(0)}
.btn-secondary{background:linear-gradient(135deg,#11998e,#38ef7d)}
.btn-secondary:hover{box-shadow:0 8px 25px rgba(56,239,125,0.3)}
#exam-screen{display:flex;flex-direction:column;flex:1;min-height:0}
.progress-text{text-align:center;color:#aaa;font-size:0.8rem;margin-bottom:4px}
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:10px;margin-bottom:8px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2,#38ef7d);border-radius:10px;transition:width 0.5s ease;width:0%}
#questions-container{flex:1;overflow:hidden}
.question-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px 20px;height:100%;display:flex;flex-direction:column;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.question-number{font-size:0.7rem;color:#667eea;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:600}
.question-text{font-size:1rem;color:#fff;margin-bottom:12px;line-height:1.4;flex-shrink:0}
.options{display:flex;flex-direction:column;gap:8px;flex:1;justify-content:center}
.option{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 16px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:10px;font-size:0.9rem}
.option:hover{background:rgba(102,126,234,0.15);border-color:rgba(102,126,234,0.4)}
.option.selected{background:rgba(102,126,234,0.2);border-color:#667eea;color:#fff}
.option.correct{background:rgba(56,239,125,0.15);border-color:#38ef7d;color:#38ef7d}
.option.incorrect{background:rgba(255,82,82,0.15);border-color:#ff5252;color:#ff5252}
.option-marker{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;transition:all 0.3s}
.option.selected .option-marker{background:#667eea;border-color:#667eea;color:#fff}
.option.correct .option-marker{background:#38ef7d;border-color:#38ef7d;color:#000}
.option.incorrect .option-marker{background:#ff5252;border-color:#ff5252;color:#fff}
.feedback-msg{margin-top:8px;padding:10px 16px;border-radius:8px;font-weight:600;font-size:0.85rem;animation:fadeIn 0.3s ease;flex-shrink:0}
.fb-correct{background:rgba(56,239,125,0.12);color:#38ef7d;border:1px solid rgba(56,239,125,0.3)}
.fb-incorrect{background:rgba(255,82,82,0.12);color:#ff5252;border:1px solid rgba(255,82,82,0.3)}
.nav-buttons{display:flex;justify-content:space-between;margin-top:8px;flex-shrink:0;padding-bottom:2px}
.hidden{display:none!important}
#results{text-align:center;padding:20px;overflow-y:auto;flex:1}
.score-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(#38ef7d 0deg,#38ef7d calc(var(--score)*3.6deg),rgba(255,255,255,0.1) calc(var(--score)*3.6deg));display:flex;align-items:center;justify-content:center;margin:15px auto;position:relative}
.score-inner{width:110px;height:110px;border-radius:50%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-number{font-size:2.2rem;font-weight:800;color:#fff}
.score-label{font-size:0.8rem;color:#aaa}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0}
.result-stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;text-align:center}
.result-stat .number{font-size:1.4rem;font-weight:700}
.result-stat .label{font-size:0.7rem;color:#aaa;margin-top:3px}
.correct-count .number{color:#38ef7d}
.incorrect-count .number{color:#ff5252}
.review-section{margin-top:15px;text-align:left}
.review-item{background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 14px;margin-bottom:8px;border-left:4px solid;font-size:0.82rem}
.review-item.correct-review{border-left-color:#38ef7d}
.review-item.incorrect-review{border-left-color:#ff5252}
.review-question{color:#fff;font-weight:600;margin-bottom:4px}
.review-answer{font-size:0.8rem}
.review-answer .your-answer{color:#ff5252}
.review-answer .correct-answer{color:#38ef7d}
.review-answer span{display:block;margin-bottom:2px}
</style>
</head>
<body>
<div class="container">

<div id="start-screen">
<h2>Preparado para el examen?</h2>
<p>Las preguntas aparecerán en orden aleatorio.<br>Tienes que seleccionar una respuesta por cada pregunta.</p>
<button class="btn" onclick="startExam()">Iniciar Examen</button>
</div>

<div id="exam-screen" class="hidden">
<div class="progress-text" id="progress-text">Pregunta 1 de 40</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div id="questions-container"></div>
<div class="nav-buttons">
<button class="btn" id="prev-btn" onclick="prevQuestion()" style="display:none">← Anterior</button>
<button class="btn btn-secondary" id="next-btn" onclick="nextQuestion()">Siguiente →</button>
</div>
</div>

<div id="results" class="hidden"></div>
</div>

<script>
const questions=[
{id:1,q:"¿Qué NO implica la transformación digital?",type:"mc",options:["Cambiar procesos","Evolución cultural","Uso estratégico de datos","Usar redes sociales"],correct:3},
{id:2,q:"Digitalizar un producto físico cambia el modelo de negocio.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:3,q:"¿Qué elemento es clave en la transformación digital?",type:"mc",options:["Compra de hardware","Uso de papel","Cultura organizacional","Aumento de plantilla"],correct:2},
{id:4,q:"¿Qué representa la pirámide DIKW?",type:"mc",options:["Datos, Iniciativa, Kinetics, Web","Datos, Información, Conocimiento, Sabiduría","Digital, Innovación, KPI, Web","Decisión, Información, KPI, Workflow"],correct:1},
{id:5,q:"¿Cuál de los siguientes es un ejemplo de digitalización?",type:"mc",options:["Escanear documentos","Rediseñar un modelo de negocio","Automatizar decisiones","Cambiar la cultura corporativa"],correct:0},
{id:6,q:"Un ERP es un sistema que se usa únicamente en departamentos de ventas.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:7,q:"Una empresa Data-Driven toma decisiones basadas en intuición.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:8,q:"Los datos se transforman en conocimiento al ponerlos en contexto y analizarlos.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:9,q:"¿Qué componente NO es esencial en una organización Data-Driven?",type:"mc",options:["Personas","Tecnología","Publicidad masiva","Procesos"],correct:2},
{id:10,q:"La digitalización es suficiente para transformar una organización.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:11,q:"Un ERP puede incluir un módulo de Business Intelligence.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:12,q:"¿Qué bloque del BMC trata sobre los canales de distribución?",type:"mc",options:["Canales / Channels","Fuente de ingresos / Revenue Streams","Recursos clave / Key Resources","Relación con clientes / Customer Relationships"],correct:0},
{id:13,q:"¿Qué significa CRM?",type:"mc",options:["Control de Recursos Materiales","Cliente Real Multicanal","Customer Relationship Management","Central de Recolección de Marketing"],correct:2},
{id:14,q:"¿Qué mide el ROI?",type:"mc",options:["Rendimiento organizacional interno","Retorno de la inversión","Reducción de incidencias","Registro de indicadores"],correct:1},
{id:15,q:"¿Cuál NO es un pilar de una empresa Data-Driven?",type:"mc",options:["Personas","Costes fijos","Procesos","Tecnología"],correct:1},
{id:16,q:"Tener redes sociales garantiza una transformación digital completa.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:17,q:"La calidad de la información afecta la calidad de las decisiones.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:18,q:"El módulo de compras de un ERP puede lanzar pedidos automáticos por stock mínimo.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:19,q:"¿Cuál de los siguientes NO es un beneficio directo del uso de un ERP?",type:"mc",options:["Automatización","Integración","Aumento del gasto en marketing","Acceso a datos en tiempo real"],correct:2},
{id:20,q:"¿Qué módulo del ERP se encarga de las compras?",type:"mc",options:["HCM","MM (Material Management)","CS","SD"],correct:1},
{id:21,q:"¿Qué sistema permite la planificación de los recursos empresariales?",type:"mc",options:["CRM","ERP","SCM","KPI"],correct:1},
{id:22,q:"¿Cuál es un ejemplo de personalización digital?",type:"mc",options:["Recomendaciones de Netflix","Publicidad impresa","Llamadas comerciales genéricas","Catálogos físicos"],correct:0},
{id:23,q:"¿Qué bloque del BMC trata de cómo se generan los ingresos?",type:"mc",options:["Canales / Channels","Fuente de ingresos / Revenue Streams","Recursos clave / Key Resources","Relación con clientes / Customer Relationships"],correct:1},
{id:24,q:"La transformación digital solo implica cambiar los sistemas tecnológicos.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:25,q:"El ROI mide la rentabilidad de una inversión.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:26,q:"Ser digital es lo mismo que haber hecho una transformación digital.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:27,q:"Un ERP modular permite dividir funciones por departamentos.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:28,q:"Un Business Scorecard permite alinear estrategia y métricas.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:29,q:"¿Cuál es una fuente de información secundaria?",type:"mc",options:["Datos oficiales del Gobierno","Encuestas propias","Reuniones internas","Entrevistas a clientes"],correct:0},
{id:30,q:"¿Cuál es un valor clave de la información?",type:"mc",options:["Precio","Audiencia","Auditable","Dinamismo"],correct:2},
{id:31,q:"¿Qué herramienta se utiliza para medir la estrategia en una empresa?",type:"mc",options:["KPI","ERP","CRM","BSC (Balanced Scorecard)"],correct:3},
{id:32,q:"Los ladrones de tiempo pueden ser tanto internos como externos.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:33,q:"El Business Model Canvas se usa para definir funciones técnicas.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:34,q:"¿Qué es un indicador de engagement digital?",type:"mc",options:["Tasa de conversión","Rentabilidad","Beneficio neto","Tasa de rotación"],correct:0},
{id:35,q:"¿Qué significa que una empresa esté en estado \"estratégico\" en datos?",type:"mc",options:["Tiene muchos datos","Toma decisiones basadas en datos","Usa hojas de cálculo","Depende de la intuición"],correct:1},
{id:36,q:"El CRM se enfoca en gestionar la relación con los proveedores.",type:"tf",options:["Verdadero","Falso"],correct:1},
{id:37,q:"¿Cuál de estos es un KPI típico?",type:"mc",options:["Nombre del cliente","Email de contacto","Productividad","Cultura empresarial"],correct:2},
{id:38,q:"¿Cuál es uno de los errores comunes en la transformación digital?",type:"mc",options:["Falta de herramientas","Exceso de formación","Foco solo en tecnología","Tener muchos canales digitales"],correct:2},
{id:39,q:"La ISO 38500 está relacionada con el gobierno de datos.",type:"tf",options:["Verdadero","Falso"],correct:0},
{id:40,q:"La transformación digital afecta solo a los departamentos de TI.",type:"tf",options:["Verdadero","Falso"],correct:1}
];

let shuffled=[];
let currentQ=0;
let answers={};
let answered={};
const markers=["A","B","C","D"];

function shuffle(arr){
const a=[...arr];
for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
return a;
}

function startExam(){
shuffled=shuffle(questions);
currentQ=0;
answers={};
answered={};
document.getElementById("start-screen").classList.add("hidden");
document.getElementById("exam-screen").classList.remove("hidden");
document.getElementById("results").classList.add("hidden");
renderQuestion();
}

function renderQuestion(){
const q=shuffled[currentQ];
const total=shuffled.length;
document.getElementById("progress-text").textContent=`Pregunta ${currentQ+1} de ${total}`;
document.getElementById("progress-fill").style.width=`${((currentQ+1)/total)*100}%`;

const prevBtn=document.getElementById("prev-btn");
const nextBtn=document.getElementById("next-btn");
prevBtn.style.display=currentQ>0?"inline-block":"none";
nextBtn.textContent=currentQ===total-1?"Finalizar ✓":"Siguiente →";

const container=document.getElementById("questions-container");
const saved=answers[q.id]!==undefined?answers[q.id]:-1;
const isLocked=answered[q.id]===true;

let html=`<div class="question-card">
<div class="question-number">Pregunta ${currentQ+1} de ${total} · ${q.type==="tf"?"Verdadero / Falso":"Opción múltiple"}</div>
<div class="question-text">${q.q}</div>
<div class="options">`;

q.options.forEach((opt,i)=>{
let cls="option";
if(isLocked){
if(i===q.correct)cls="option correct";
else if(i===saved&&i!==q.correct)cls="option incorrect";
}else if(saved===i){
cls="option selected";
}
html+=`<div class="${cls}" onclick="selectOption(${q.id},${i})" id="opt-${q.id}-${i}">
<div class="option-marker">${q.type==="tf"?(i===0?"V":"F"):markers[i]}</div>
<span>${opt}</span>
</div>`;
});

if(isLocked){
html+=`</div><div class="feedback-msg ${saved===q.correct?"fb-correct":"fb-incorrect"}">
${saved===q.correct?"✓ Correcto!":"✗ Incorrecto. La respuesta correcta es: <strong>"+q.options[q.correct]+"</strong>"}
</div>`;
}else{
html+=`</div>`;
}
html+=`</div>`;
container.innerHTML=html;
}

function selectOption(qid,opt){
if(answered[qid])return;
answers[qid]=opt;
answered[qid]=true;
renderQuestion();
}

function nextQuestion(){
if(currentQ<shuffled.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:"smooth"})}
else{showResults()}
}

function prevQuestion(){
if(currentQ>0){currentQ--;renderQuestion();window.scrollTo({top:0,behavior:"smooth"})}
}

function showResults(){
document.getElementById("exam-screen").classList.add("hidden");
document.getElementById("results").classList.remove("hidden");

let correct=0,incorrect=0;
const review=[];
shuffled.forEach(q=>{
const a=answers[q.id];
const isCorrect=a===q.correct;
if(isCorrect)correct++;else incorrect++;
review.push({q,answered:a,correct:q.correct,isCorrect});
});

const pct=Math.round((correct/shuffled.length)*100);
const emoji=pct>=80?"Excelente!":pct>=60?"Bien":pct>=40?"Aprobado":"Necesitas estudiar más";

let html=`<h2 style="color:#fff;font-size:1.6rem;margin-bottom:5px">Examen Finalizado</h2>
<p style="color:#aaa;margin-bottom:10px">${emoji}</p>
<div class="score-circle" style="--score:${pct}">
<div class="score-inner">
<div class="score-number">${pct}%</div>
<div class="score-label">Calificación</div>
</div>
</div>
<div class="results-grid">
<div class="result-stat correct-count"><div class="number">${correct}</div><div class="label">Correctas</div></div>
<div class="result-stat incorrect-count"><div class="number">${incorrect}</div><div class="label">Incorrectas</div></div>
<div class="result-stat"><div class="number">${correct}/${shuffled.length}</div><div class="label">Total</div></div>
</div>
<button class="btn" onclick="location.reload()" style="margin-bottom:20px">Volver a Intentar</button>
<div class="review-section"><h3 style="color:#fff;margin-bottom:15px;font-size:1.2rem">Revisión de respuestas</h3>`;

review.forEach((r,i)=>{
const cls=r.isCorrect?"correct-review":"incorrect-review";
html+=`<div class="review-item ${cls}">
<div class="review-question">${i+1}. ${r.q.q}</div>
<div class="review-answer">`;
if(!r.isCorrect){
const yourAns=r.answered!==undefined?r.q.options[r.answered]:"Sin respuesta";
html+=`<span class="your-answer">Tu respuesta: ${yourAns}</span>`;
}
html+=`<span class="correct-answer">Respuesta correcta: ${r.q.options[r.correct]}</span>
</div></div>`;
});

html+=`</div></div>`;
document.getElementById("results").innerHTML=html;
window.scrollTo({top:0,behavior:"smooth"});
}
</script>
</body>
</html>
